---
# [BR-05] Users and access management
- name: Create groups
  ansible.builtin.group:
    name: "{{ item.groups }}"
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.groups }}"

- name: Create users
  ansible.builtin.user:
    name: "{{ item.username }}"
    group: "{{ item.groups }}"
    # append: true
    shell: /bin/bash
    create_home: true
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.username }}"

