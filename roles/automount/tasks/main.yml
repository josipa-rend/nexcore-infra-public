---
- name: Install autofs package
  ansible.builtin.dnf:
    name:
    - autofs
    - nfs-utils
    state: present

- name: Deploy autofs master map for shared storage
  ansible.builtin.lineinfile:
    path: /etc/auto.master
    line: "/- /etc/auto.company"
    state: present
  notify: Restart autofs

- name: Deploy autofs direct map
  ansible.builtin.template:
    src: auto.company.j2
    dest: /etc/auto.company
    owner: root
    group: root
    mode: "0644"
  notify: Restart autofs

- name: Ensure autofs service is enabled
  ansible.builtin.service:
    name: autofs
    state: started
    enabled: true
