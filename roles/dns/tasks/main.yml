---
- name: Install bind package
  ansible.builtin.dnf:
    name:
      - bind
      - bind-utils
    state: present

- name: Deploy named.conf
  ansible.builtin.template:
    src: named.conf.j2
    dest: /etc/named.conf
    owner: root
    group: named
    mode: "0640"
    validate: "named-checkconf %s"
  notify: Restart named

- name: Deploy zone file
  ansible.builtin.template:
    src: zone.j2
    dest: "{{ dns_zone_file }}"
    owner: named
    group: named
    mode: "0640"
    validate: "named-checkzone {{ dns_zone }} %s"
  notify: Restart named

- name: Ensure named is enabled
  ansible.builtin.service:
    name: named
    state: started
    enabled: true

- name: Ensure DNS service is allowed in firewalld
  ansible.posix.firewalld:
    service: dns
    permanent: true
    immediate: true
    state: enabled
