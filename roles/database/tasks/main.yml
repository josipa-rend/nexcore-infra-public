---
- name: Install mariadb server and client
  ansible.builtin.dnf:
    name:
      - mariadb-server
      - mariadb
      - python3-PyMySQL
    state: present

- name: Deploy mariadb-server-bind file
  ansible.builtin.template:
    src: mariadb-server.cnf.j2
    dest: /etc/my.cnf.d/99-mariadb-server-bind.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mariadb

- name: Remove old MariaDB bind config files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/my.cnf.d/mariadb-server-bind.cnf
  notify: Restart mariadb

- name: Ensure mariadb service is enabled
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
  
- name: Set root password
  community.mysql.mysql_user:
    # za prvo pokretanje, uz check_implicit_admin
    name: "{{ db_root_user }}"
    password: "{{ db_root_password }}"
    # radi idempotentnosti: koristi se pri svakom iducem loginu
    login_user: "{{ db_root_user }}"
    login_password: "{{ db_root_password }}"
    host_all: true
    login_unix_socket: /var/lib/mysql/mysql.sock
    check_implicit_admin: true

- name: Ensure mysql service is allowed in firewalld
  ansible.posix.firewalld:
    service: mysql
    permanent: true
    immediate: true
    state: enabled

# MediaWiki database
- name: Create mediawiki db
  community.mysql.mysql_db:
    name: "{{ wiki_db_name }}"
    state: present
    login_user: "{{ db_root_user }}"
    login_password: "{{ db_root_password }}"
    login_unix_socket: "{{ login_unix_socket_file }}"

- name: Create wiki db user
  community.mysql.mysql_user:
    name: "{{ wiki_db_user }}"
    password: "{{ wiki_db_password }}"
    host: "{{ db_allowed_host_address }}"
    priv: "{{ wiki_db_name }}.*:ALL"
    state: present
    login_user: "{{ db_root_user }}"
    login_password: "{{ db_root_password }}"
    login_unix_socket: "{{ login_unix_socket_file }}"

# WordPress database
- name: Create wordpress db
  community.mysql.mysql_db:
    name: "{{ wordpress_db_name }}"
    state: present
    login_user: "{{ db_root_user }}"
    login_password: "{{ db_root_password }}"
    login_unix_socket: "{{ login_unix_socket_file }}"

- name: Create wordpress db user
  community.mysql.mysql_user:
    name: "{{ wordpress_db_user }}"
    password: "{{ wordpress_db_password }}"
    host: "{{ db_allowed_host_address }}"
    priv: "{{ wordpress_db_name }}.*:ALL"
    state: present
    login_user: "{{ db_root_user }}"
    login_password: "{{ db_root_password }}"
    login_unix_socket: "{{ login_unix_socket_file }}"
